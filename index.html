<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antaragni'26 Roadtrips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=League+Gothic&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-container">
        <header class="navbar">
            <a href="#" class="logo-link">
                <img src="logo.png" alt="Antaragni Logo" class="logo-img">
            </a>
            <nav class="nav-menu">
                <a href="#" class="nav-link active">HOME</a>
                <a href="#" class="nav-link">ROADTRIPS</a>
                <a href="#" class="nav-link">ABOUT</a>
                <a href="#" class="nav-link">CONTACT</a>
            </nav>
            <a href="#" class="btn-register-nav">
                REGISTER NOW
                <svg class="arrow-icon" width="10" height="10" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4.5M9.5 2.5V7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </header>

        <div class="bg-vertical-text">
            <div class="word word-filled">NATION.</div>
            <div class="word word-outline">CAMPUSES.</div>
            <div class="word word-outline">TALENT.</div>
            <div class="word word-outline">LEGENDS.</div>
        </div>

        <main class="hero-content">
            <h1 class="hero-title">ROADTRIPS</h1>
            
            <div class="hero-description-container">
                <div class="green-bar"></div>
                <p class="hero-description">
                    The fire spreads across the nation.<br>
                    Witness the preliminary battles that<br>
                    forge the legends of Antaragni.
                </p>
            </div>

            <a href="#" class="btn-register-hero">
                REGISTER NOW
                <svg class="arrow-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2.5 9.5L9.5 2.5M9.5 2.5H4.5M9.5 2.5V7.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
        </main>

        <section class="stats-container">
            <div class="stat-item">
                <div class="stat-number">15+</div>
                <div class="stat-label">CITIES</div>
                <div class="stat-bar bar-green"></div>
            </div>
            <div class="stat-divider"></div>
            
            <div class="stat-item">
                <div class="stat-number">50+</div>
                <div class="stat-label">CAMPUSES</div>
                <div class="stat-bar bar-purple"></div>
            </div>
            <div class="stat-divider"></div>
            
            <div class="stat-item">
                <div class="stat-number">20K+</div>
                <div class="stat-label">STUDENTS</div>
                <div class="stat-bar bar-red"></div>
            </div>
            <div class="stat-divider"></div>
            
            <div class="stat-item">
                <div class="stat-number">1</div>
                <div class="stat-label">EPIC JOURNEY</div>
                <div class="stat-bar bar-yellow"></div>
            </div>
        </section>
    </div>
</body>
</html>
